# Stack de production du back-office (Next.js).
#
# Dans Dokploy, définis les clés ci-dessous dans l'onglet "Environment" du
# projet : elles sont interpolées ici via ${...}.
#
# ⚠️  NEXT_PUBLIC_API_URL est inliné dans le bundle client AU BUILD. Le modifier
#     impose donc de reconstruire l'image (et non un simple redémarrage).
services:
  web:
    build:
      context: .
      target: final
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
